name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.14"
      - run: |
          uv sync --locked --dev
          uv run ruff check .
          uv run ruff format --check --diff .
          uv run python -m pytest
        working-directory: backend
