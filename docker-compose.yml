services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expenses_manager}
      POSTGRES_USER: ${POSTGRES_USER:-expenses_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  test_db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB:-expenses_manager_test}
      POSTGRES_USER: ${TEST_POSTGRES_USER:-expenses_test_user}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-change_me}
    ports:
      - "6543:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

volumes:
  postgres_data:
  postgres_test_data:
